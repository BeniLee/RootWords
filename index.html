<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字字根學習單 - 導航首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e3a5f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        nav {
            height: 60px;
            background-color: #1e3a5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            z-index: 10;
            flex-shrink: 0;
        }
        .nav-title {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-controls label {
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .nav-controls select {
            padding: 6px 28px 6px 10px;
            font-size: 0.9rem;
            border-radius: 6px;
            border: 1px solid #93c5fd;
            background-color: #ffffff;
            color: #1f2937;
            cursor: pointer;
            outline: none;
            appearance: auto;
            min-width: 130px;
        }
        .nav-controls button {
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            background-color: #3b82f6;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .nav-controls button:hover {
            background-color: #2563eb;
        }
        .version-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 3px 12px;
        }
        .version-toggle label {
            font-size: 0.82rem;
            cursor: pointer;
            user-select: none;
        }
        .version-toggle input[type="checkbox"] {
            accent-color: #10b981;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-title">📚 英文單字字根學習單（導覽模式）</div>
        <div class="nav-controls">
            <label for="unit-select">選擇單元：</label>
            <select id="unit-select">
                <option value="unit01.html" selected>單元 01</option>
                <option value="unit02.html">單元 02</option>
                <option value="unit03.html">單元 03</option>
                <option value="unit04.html">單元 04</option>
                <option value="unit05.html">單元 05</option>
                <option value="unit06.html">單元 06</option>
                <option value="unit07.html">單元 07</option>
                <option value="unit08.html">單元 08</option>
                <option value="unit09.html">單元 09</option>
                <option value="unit10.html">單元 10</option>
                <option value="unit11.html">單元 11</option>
                <option value="unit12.html">單元 12</option>
                <option value="unit13.html">單元 13</option>
                <option value="unit14.html">單元 14</option>
                <option value="unit15.html">單元 15</option>
                <option value="unit16.html">單元 16</option>
                <option value="unit17.html">單元 17</option>
                <option value="unit18.html">單元 18</option>
                <option value="unit19.html">單元 19</option>
                <option value="unit20.html">單元 20</option>
                <option value="unit21.html">單元 21</option>
                <option value="unit22.html">單元 22</option>
                <option value="unit23.html">單元 23</option>
                <option value="unit24.html">單元 24</option>
                <option value="unit25.html">單元 25</option>
                <option value="unit26.html">單元 26</option>
                <option value="unit27.html">單元 27</option>
                <option value="unit28.html">單元 28</option>
                <option value="unit29.html">單元 29</option>
                <option value="unit30.html">單元 30</option>
                <option value="unit31.html">單元 31</option>
                <option value="unit32.html">單元 32</option>
                <option value="unit33.html">單元 33</option>
                <option value="unit34.html">單元 34</option>
                <option value="unit35.html">單元 35</option>
                <option value="unit36.html">單元 36</option>
                <option value="unit37.html">單元 37</option>
                <option value="unit38.html">單元 38</option>
                <option value="unit39.html">單元 39</option>
                <option value="unit40.html">單元 40</option>
                <option value="unit41.html">單元 41</option>
                <option value="unit42.html">單元 42</option>
                <option value="unit43.html">單元 43</option>
                <option value="unit44.html">單元 44</option>
                <option value="unit45.html">單元 45</option>
                <option value="unit46.html">單元 46</option>
                <option value="unit47.html">單元 47</option>
                <option value="unit48.html">單元 48</option>
                <option value="unit49.html">單元 49</option>
                <option value="unit50.html">單元 50</option>
            </select>

            <button onclick="prevUnit()">⬅ 上一個</button>
            <button onclick="nextUnit()">下一個 ➡</button>

            <input type="number" id="unit-input" min="1" max="50" placeholder="單元號" style="width:70px;padding:6px 8px;font-size:0.9rem;border-radius:6px;border:1px solid #93c5fd;">
            <button onclick="jumpToNumber()">跳到</button>

            <div class="version-toggle">
                <input type="checkbox" id="v2-toggle" title="切換整合版 v2（含 YouTube 連結）">
                <label for="v2-toggle">整合版</label>
            </div>
        </div>
    </nav>

    <iframe id="content-frame" src="unit01.html" title="學習單內容"></iframe>

    <script>
        const select = document.getElementById('unit-select');
        const iframe = document.getElementById('content-frame');
        const v2Toggle = document.getElementById('v2-toggle');

        // Restore v2 preference
        (function() {
            const v = localStorage.getItem('rootwords-v2');
            if (v === '1') {
                v2Toggle.checked = true;
                applySrc();
            }
        })();

        v2Toggle.addEventListener('change', function () {
            localStorage.setItem('rootwords-v2', this.checked ? '1' : '0');
            applySrc();
        });

        function getFile() {
            const base = select.value;
            return v2Toggle.checked ? base.replace('.html', '-v2.html') : base;
        }

        function applySrc() {
            iframe.src = getFile();
        }

        select.addEventListener('change', function () {
            applySrc();
        });

        function prevUnit() {
            const idx = select.selectedIndex;
            if (idx > 0) {
                select.selectedIndex = idx - 1;
                applySrc();
            }
        }

        function nextUnit() {
            const idx = select.selectedIndex;
            if (idx < select.options.length - 1) {
                select.selectedIndex = idx + 1;
                applySrc();
            }
        }

        function jumpToNumber() {
            const input = document.getElementById('unit-input');
            const num = parseInt(input.value, 10);
            if (!Number.isNaN(num) && num >= 1 && num <= 50) {
                const idx = num - 1;
                select.selectedIndex = idx;
                applySrc();
            }
        }

        select.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                applySrc();
            }
        });
    </script>
</body>
</html>
