<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字字根學習單 - 導航首頁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e3a5f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        nav {
            height: 60px;
            background-color: #1e3a5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            z-index: 10;
            flex-shrink: 0;
        }
        .nav-title {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-controls label {
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .nav-controls select {
            padding: 6px 28px 6px 10px;
            font-size: 0.9rem;
            border-radius: 6px;
            border: 1px solid #93c5fd;
            background-color: #ffffff;
            color: #1f2937;
            cursor: pointer;
            outline: none;
            appearance: auto;
            min-width: 130px;
        }
        .nav-controls button {
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            background-color: #3b82f6;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .nav-controls button:hover {
            background-color: #2563eb;
        }
        .version-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 3px 12px;
        }
        .version-toggle label {
            font-size: 0.82rem;
            cursor: pointer;
            user-select: none;
        }
        .version-toggle input[type="checkbox"] {
            accent-color: #10b981;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-title">📚 英文單字字根學習單（導覽模式）
            <a href="https://www.youtube.com/playlist?list=PLOEaZuKMexgi1r0WpQHKHNYHQ8J-7FKJV" target="_blank" style="color:#fbbf24;font-size:0.85rem;margin-left:12px;text-decoration:none;font-weight:500;">▶ 播放清單</a>
        </div>
        <div class="nav-controls">
            <label for="unit-select">選擇單元：</label>
            <select id="unit-select">
                <option value="unit01-ped.html" selected>單元 01【腳】-ped-</option>
                <option value="unit02-man.html">單元 02【手】-man-</option>
                <option value="unit03-spect.html">單元 03【看】-spect-</option>
                <option value="unit04-preci-val.html">單元 04【價值】-preci-/-val-</option>
                <option value="unit05-dict.html">單元 05【說】-dict-</option>
                <option value="unit06-scribe-script.html">單元 06【寫】-scribe-/-script-</option>
                <option value="unit07-tract.html">單元 07【拉】-tract-</option>
                <option value="unit08-pel.html">單元 08【推】-pel-</option>
                <option value="unit09-insul.html">單元 09【島】-insul-</option>
                <option value="unit10-rupt.html">單元 10【破裂】-rupt-</option>
                <option value="unit11-flu.html">單元 11【流動】-flu-</option>
                <option value="unit12-fact.html">單元 12【做】-fact-</option>
                <option value="unit13-fect.html">單元 13【做】-fect-</option>
                <option value="unit14-son-cord.html">單元 14【聲音/心】-son-/-cord-</option>
                <option value="unit15-light-rad.html">單元 15【光】-light-/-rad-</option>
                <option value="unit16-pend.html">單元 16【懸掛】-pend-</option>
                <option value="unit17-pend-part2.html">單元 17【懸掛】-pend-(2)</option>
                <option value="unit18-sta.html">單元 18【站】-sta-</option>
                <option value="unit19-sti.html">單元 19【站】-sti-</option>
                <option value="unit20-sist.html">單元 20【站】-sist-</option>
                <option value="unit21-bio-char.html">單元 21 生物特性</option>
                <option value="unit22-sid.html">單元 22【坐】-sid-/-sed-</option>
                <option value="unit23-ven.html">單元 23【來】-ven-</option>
                <option value="unit24-vent.html">單元 24【來】-vent-</option>
                <option value="unit25-scend.html">單元 25【爬】-scend-</option>
                <option value="unit26-vor-ed.html">單元 26【吃】-vor-/-ed-</option>
                <option value="unit27-carn.html">單元 27【肉】-carn-</option>
                <option value="unit28-pass-path.html">單元 28【感覺】-pass-/-path-</option>
                <option value="unit29-habit.html">單元 29【居住】-habit-</option>
                <option value="unit30-logue-loqu.html">單元 30【說】-logue-/-loqu-</option>
            </select>

            <button onclick="prevUnit()">⬅ 上一個</button>
            <button onclick="nextUnit()">下一個 ➡</button>

            <input type="number" id="unit-input" min="1" max="30" placeholder="單元號" style="width:70px;padding:6px 8px;font-size:0.9rem;border-radius:6px;border:1px solid #93c5fd;">
            <button onclick="jumpToNumber()">跳到</button>


        </div>
    </nav>

    <iframe id="content-frame" src="unit01-ped.html" title="學習單內容"></iframe>

    <script>
        const select = document.getElementById('unit-select');
        const iframe = document.getElementById('content-frame');
        function applySrc() {
            iframe.src = select.value;
        }

        select.addEventListener('change', function () {
            applySrc();
        });

        function prevUnit() {
            const idx = select.selectedIndex;
            if (idx > 0) {
                select.selectedIndex = idx - 1;
                applySrc();
            }
        }

        function nextUnit() {
            const idx = select.selectedIndex;
            if (idx < select.options.length - 1) {
                select.selectedIndex = idx + 1;
                applySrc();
            }
        }

        function jumpToNumber() {
            const input = document.getElementById('unit-input');
            const num = parseInt(input.value, 10);
            if (!Number.isNaN(num) && num >= 1 && num <= 30) {
                const idx = num - 1;
                select.selectedIndex = idx;
                applySrc();
            }
        }

        select.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                applySrc();
            }
        });
    </script>
</body>
</html>
